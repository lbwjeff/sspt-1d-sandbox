case:
  name: simple_planar_interface

mesh:
  nx: 5 # Number of finite element
  dx: 1.0e-3 # Size of finite element, in um 

interface:
  sites: [1.0e-3, 3.0e-3] # Voronoi site positions to generate the interface, in um
  precision: 1.0e-7 # Beloning precision for distance calculation, in um

  eta: 0.1 # Diffuse interface width, in um
